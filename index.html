<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Computer Vision - Pengenalan Gambar</title>
    <link rel="icon" type="image/png" href="./assets/images/favicon.png">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body>
    <!-- Background Glow Blurs -->
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <div class="container">
        <div class="app-card">
            <header>
                <div class="logo-wrapper">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="logo-icon"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m22 8-6 4 6 4V8Z"/><rect width="14" height="12" x="2" y="6" rx="2" ry="2"/></svg>
                    <span class="logo-text">Vision AI</span>
                </div>
                <h1>Detektor Gambar</h1>
                <p class="subtitle">Deteksi Real-Time Gerakan Tangan</p>
                <div class="header-badges">
                    <span class="badge badge-stone">✊ Batu</span>
                    <span class="badge badge-scissors">✌️ Gunting</span>
                    <span class="badge badge-paper">✋ Kertas</span>
                </div>
            </header>

            <main>
                <!-- Controls -->
                <div class="controls">
                    <div class="control-group">
                        <label for="cameraSelect">Pilih Kamera</label>
                        <div class="select-wrapper">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="select-icon"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                            <select id="cameraSelect" disabled>
                                <option>Memuat Kamera...</option>
                            </select>
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="select-chevron"><path d="m6 9 6 6 6-6"/></svg>
                        </div>
                    </div>
                    
                    <div class="control-group">
                        <label for="fpsSelect">Kecepatan Bingkai</label>
                        <div class="select-wrapper">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="select-icon"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                            <select id="fpsSelect">
                                <option value="5">5 FPS</option>
                                <option value="15">15 FPS</option>
                                <option value="30" selected>30 FPS</option>
                                <option value="60">60 FPS</option>
                            </select>
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="select-chevron"><path d="m6 9 6 6 6-6"/></svg>
                        </div>
                    </div>
                    
                    <div class="action-buttons">
                        <button id="startBtn" class="btn btn-start" disabled>
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m22 8-6 4 6 4V8Z"/><rect width="14" height="12" x="2" y="6" rx="2" ry="2"/></svg>
                            <span>Mulai Kamera</span>
                        </button>
                        <button id="stopBtn" class="btn btn-stop" disabled>
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="5" y="5" rx="2" ry="2"/></svg>
                            <span>Hentikan</span>
                        </button>
                    </div>
                </div>

                <!-- Video Display Area -->
                <div class="video-container">
                    <video id="videoElement" autoplay playsinline></video>
                    <canvas id="canvasElement"></canvas>
                    
                    <!-- Scanner Overlays -->
                    <div class="scanner-overlay">
                        <div class="scanner-corner top-left"></div>
                        <div class="scanner-corner top-right"></div>
                        <div class="scanner-corner bottom-left"></div>
                        <div class="scanner-corner bottom-right"></div>
                        <div class="scan-line"></div>
                    </div>

                    <!-- Inactive State Placeholder -->
                    <div class="webcam-placeholder">
                        <div class="placeholder-icon-wrapper">
                            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round" class="placeholder-icon"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                        </div>
                        <h3>Kamera Nonaktif</h3>
                        <p>Klik tombol <strong>Mulai Kamera</strong> di atas untuk mengaktifkan pemindaian real-time.</p>
                    </div>
                </div>

                <!-- Results & Status -->
                <div class="results">
                    <div id="modelStatus" class="status">Memuat Model...</div>
                    <div id="predictionResult" class="prediction">
                        <div class="prediction-header">
                            <span class="prediction-title">Hasil Deteksi</span>
                            <span class="confidence" id="predictionConfidence">0%</span>
                        </div>
                        <div class="label-wrapper">
                            <span class="label" id="predictionLabel">-</span>
                        </div>
                        <div class="confidence-bar-bg">
                            <div class="confidence-bar-fill" id="confidenceBar"></div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- TensorFlow.js and App logic -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script type="module" src="./assets/js/app.js"></script>
</body>
</html>
